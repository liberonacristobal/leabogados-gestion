<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LE Abogados"/>
  <meta name="theme-color" content="#003C50"/>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet"/>
  <title>LE Abogados · Gestión</title>
  <style>
    html, body { margin:0; padding:0; background:#0F0F0F; }
    /* Filas clickeables de la ficha del cliente (affordance: hover/active + chevron) */
    .lf-row { cursor:pointer; transition:background .12s; }
    .lf-row:hover { background:#F5F7F9; }
    .lf-row:active { background:#EEF1F3; }
    .lf-row .lf-chev { color:#99ABB4; transition:color .12s; }
    .lf-row:hover .lf-chev { color:#537281; }
    .lf-kpi { cursor:pointer; transition:transform .1s; }
    .lf-kpi:active { transform:scale(.985); }
    .lf-kpi:hover .lf-chev { color:#537281; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
